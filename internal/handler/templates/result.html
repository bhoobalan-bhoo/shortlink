{{if .Error}}
  <div class="error">{{.Error}}</div>
{{else}}
  <div class="result">
    <div class="url">{{.ShortURL}}</div>
    <div class="meta">
      {{if eq .Expires "Never"}}Never expires{{else}}Expires {{.Expires}}{{end}} · Created just now
    </div>
    <div class="actions">
      <button type="button" class="btn-outline"
              onclick="navigator.clipboard.writeText('{{.ShortURL}}'); this.textContent='Copied';">Copy</button>
      <a class="link-arrow" href="/{{.Slug}}/stats">Track this link →</a>
      <img class="qr" src="/{{.Slug}}/qr" alt="QR" width="56" height="56">
    </div>
  </div>
{{end}}
