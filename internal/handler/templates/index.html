<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>bhoo-shortlink</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>
<body>
  <main class="center">
    <div class="brand">
      <h1>🌿 bhoo-shortlink</h1>
      <p>Shorten any URL — calm, free &amp; open source.</p>
    </div>

    <form hx-post="/shorten" hx-target="#result" hx-swap="innerHTML" hx-disabled-elt="#go">
      <div class="field">
        <input class="url-input" type="text" name="url"
               placeholder="https://your-very-long-url.com/goes/here" autocomplete="off" autofocus required>
        <input class="custom-input" type="text" name="custom"
               placeholder="custom-path (optional)" autocomplete="off">
      </div>

      <div class="field">
        <p class="label">Link expiry</p>
        <input type="hidden" name="expires" id="expires" value="">
        <div class="toggles" id="toggles">
          <span class="toggle on" data-v="">Never expires</span>
          <span class="toggle" data-v="1h">1 hour</span>
          <span class="toggle" data-v="1d">1 day</span>
          <span class="toggle" data-v="7d">7 days</span>
          <span class="toggle" data-v="30d">30 days</span>
        </div>
      </div>

      <button class="btn" id="go" type="submit">Shorten<span class="progress"></span></button>
    </form>

    <div id="result"></div>

    <p class="footer">Built with Go &nbsp;·&nbsp; <a href="/track-urls">Track your URLs →</a></p>
  </main>

  <script>
    document.getElementById('toggles').addEventListener('click', (e) => {
      const t = e.target.closest('.toggle');
      if (!t) return;
      document.querySelectorAll('#toggles .toggle').forEach(x => x.classList.remove('on'));
      t.classList.add('on');
      document.getElementById('expires').value = t.dataset.v;
    });
    const go = document.getElementById('go');
    document.body.addEventListener('htmx:beforeRequest', (e) => {
      if (e.detail.elt.tagName === 'FORM') { go.classList.add('loading'); go.firstChild.textContent = 'Shortening...'; }
    });
    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target.id === 'result') { go.classList.remove('loading'); go.firstChild.textContent = 'Shorten'; }
    });
  </script>
</body>
</html>
