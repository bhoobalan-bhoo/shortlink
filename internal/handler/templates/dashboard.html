<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Tracked URLs · bhoo-shortlink</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script type="importmap">
    { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
  </script>
</head>
<body class="dash">
  <div class="topbar">
    <span class="crumb">bhoo-shortlink</span>
    <span class="sep">/</span>
    <span class="muted">Tracked URLs</span>
    <span class="spacer"></span>
    <a href="/">← Back to shortener</a>
  </div>

  <div class="shell">
    <aside class="sidebar">
      <div class="head">Your links</div>
      <div id="urlList">
        {{if .Links}}
          {{range .Links}}
            <div class="url-row" data-slug="{{.Slug}}"
                 hx-get="/track-urls/{{.Slug}}/logs" hx-target="#logs-data" hx-swap="innerHTML">
              <span class="badge">{{.Clicks}} clicks</span>
              <div class="u">bhoo.in/{{.Slug}}</div>
              <div class="m">created {{.Created}}</div>
            </div>
          {{end}}
        {{else}}
          <div class="empty">No links yet.<br><a href="/">Shorten one first →</a></div>
        {{end}}
      </div>
    </aside>

    <div class="main">
      <div class="globe-card">
        <canvas id="globe-canvas"></canvas>
        <div class="globe-overlay" id="overlay">← Select a link to see click data</div>
      </div>
      <div class="stats-row">
        <div class="stat"><div class="v" id="stTotal">—</div><div class="l">Total Clicks</div></div>
        <div class="stat"><div class="v" id="stLoc">—</div><div class="l">Top Location</div></div>
        <div class="stat"><div class="v" id="stLast">—</div><div class="l">Last Click</div></div>
      </div>
    </div>
  </div>

  <div id="logs-data"></div>

  <script type="module">
    import * as THREE from 'three';
    let scene, camera, renderer, world, canvas;
    const dots = []; let card = null, cardV = null;
    let autoSpin = true, spinTarget = null;

    function flag(cc) {
      if (!cc || cc.length !== 2) return '';
      return String.fromCodePoint(...[...cc.toUpperCase()].map(c => 0x1F1E6 + c.charCodeAt(0) - 65));
    }

    function llToVec(lat, lon, r = 1) {
      const phi = (90 - lat) * Math.PI / 180, theta = (lon + 180) * Math.PI / 180;
      return new THREE.Vector3(
        -r * Math.sin(phi) * Math.cos(theta),
         r * Math.cos(phi),
         r * Math.sin(phi) * Math.sin(theta));
    }

    function graticule() {
      const g = new THREE.Group();
      const mat = new THREE.LineBasicMaterial({ color: 0xddddd8, transparent: true, opacity: 0.55 });
      for (let lat = -80; lat <= 80; lat += 20) {
        const pts = []; for (let lon = 0; lon <= 360; lon += 4) pts.push(llToVec(lat, lon, 1.001));
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
      }
      for (let lon = 0; lon < 360; lon += 20) {
        const pts = []; for (let lat = -90; lat <= 90; lat += 4) pts.push(llToVec(lat, lon, 1.001));
        g.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), mat));
      }
      return g;
    }

    function build() {
      canvas = document.getElementById('globe-canvas');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
      scene = new THREE.Scene();
      camera = new THREE.PerspectiveCamera(42, 1, 0.1, 100);
      camera.position.set(0, 0, 3.0);
      world = new THREE.Group(); scene.add(world);
      world.add(new THREE.Mesh(new THREE.SphereGeometry(0.99, 64, 64),
        new THREE.MeshBasicMaterial({ color: 0xe8e8e4 })));
      world.add(graticule());
      addEventListener('resize', resize); resize();
      requestAnimationFrame(loop);
    }

    function resize() {
      const w = canvas.clientWidth, h = canvas.clientHeight;
      if (!w || !h) return;
      camera.aspect = w / h; camera.updateProjectionMatrix();
      renderer.setSize(w, h, false);
    }

    function loop() {
      requestAnimationFrame(loop);
      resize();
      if (spinTarget !== null) {
        world.rotation.y += (spinTarget - world.rotation.y) * 0.07;
        if (Math.abs(spinTarget - world.rotation.y) < 0.002) spinTarget = null;
      } else if (autoSpin) { world.rotation.y += 0.0008; }
      const now = performance.now();
      for (const d of dots) {
        if (d.ring) {
          const age = (now - d.born) / 600;
          if (age <= 1) { const s = 0.02 + age * 0.4; d.ring.scale.set(s, s, s); d.ring.material.opacity = (1 - age) * 0.3; }
          else { world.remove(d.ring); d.ring = null; }
        }
      }
      renderer.render(scene, camera);
      placeCard();
    }

    function clearDots() {
      dots.forEach(d => { world.remove(d.dot); if (d.ring) world.remove(d.ring); });
      dots.length = 0;
      if (card) { card.remove(); card = null; cardV = null; }
    }

    function dropDot(lat, lon, pulse) {
      const v = llToVec(lat, lon, 1.012);
      const dot = new THREE.Mesh(new THREE.SphereGeometry(0.022, 16, 16),
        new THREE.MeshBasicMaterial({ color: 0x5b47e0 }));
      dot.position.copy(v); world.add(dot);
      let ring = null;
      if (pulse) {
        ring = new THREE.Mesh(new THREE.RingGeometry(0.9, 1.0, 40),
          new THREE.MeshBasicMaterial({ color: 0x5b47e0, transparent: true, opacity: 0.3, side: THREE.DoubleSide }));
        ring.position.copy(v); ring.lookAt(v.clone().add(v.clone().normalize())); ring.scale.set(0.02, 0.02, 0.02);
        world.add(ring);
      }
      dots.push({ dot, ring, born: performance.now(), v });
      return v;
    }

    function showCard(v, g) {
      card = document.createElement('div');
      card.className = 'info-card'; card.style.opacity = '0';
      const place = (g.city || 'Unknown') + (g.country ? ', ' + g.country : '') + ' ' + flag(g.cc);
      card.innerHTML =
        `<div class="loc">${place}</div>
         <div class="row">${g.ip}</div>
         <div class="row">${g.agent}</div>
         <div class="row">${g.time} UTC</div>`;
      document.body.appendChild(card); cardV = v;
      requestAnimationFrame(() => { card.style.opacity = '1'; });
    }

    function placeCard() {
      if (!card || !cardV) return;
      const w4 = cardV.clone().applyMatrix4(world.matrixWorld);
      const ndc = w4.clone().project(camera);
      const r = canvas.getBoundingClientRect();
      card.style.opacity = w4.z > 0.05 ? '1' : '0';
      card.style.left = (r.left + (ndc.x * 0.5 + 0.5) * r.width) + 'px';
      card.style.top = (r.top + (-ndc.y * 0.5 + 0.5) * r.height) + 'px';
    }

    function snapTo(lat, lon) { const v = llToVec(lat, lon); spinTarget = Math.atan2(-v.x, v.z); }

    function countUp(el, target) {
      const start = performance.now(), dur = 600;
      (function step(t) { const k = Math.min(1, (t - start) / dur);
        el.textContent = Math.round(target * k); if (k < 1) requestAnimationFrame(step); })(start);
    }
    function relTime(ts) {
      const s = Math.max(0, (Date.now() - ts) / 1000);
      if (s < 60) return 'just now';
      if (s < 3600) return Math.floor(s / 60) + ' min ago';
      if (s < 86400) return Math.floor(s / 3600) + ' hr ago';
      return Math.floor(s / 86400) + ' d ago';
    }

    function select(holder) {
      const rows = [...holder.querySelectorAll('.click')];
      clearDots();
      document.getElementById('overlay').style.opacity = rows.length ? '0' : '1';

      const data = rows.map(r => ({
        resolved: r.dataset.resolved === 'true',
        lat: parseFloat(r.dataset.lat), lon: parseFloat(r.dataset.lon),
        ip: r.dataset.ip, city: r.dataset.city, country: r.dataset.country, cc: r.dataset.cc,
        time: r.dataset.time, ts: parseInt(r.dataset.ts || '0', 10), agent: r.dataset.agent
      }));
      const geo = data.filter(g => g.resolved && (g.lat || g.lon));

      countUp(document.getElementById('stTotal'), rows.length);
      const counts = {};
      data.forEach(d => { if (d.country) counts[d.country] = (counts[d.country] || 0) + 1; });
      const top = Object.entries(counts).sort((a, b) => b[1] - a[1])[0];
      let topCC = ''; if (top) { const m = data.find(d => d.country === top[0]); topCC = m ? m.cc : ''; }
      document.getElementById('stLoc').textContent = top ? (flag(topCC) + ' ' + top[0]).trim() : '—';
      const lastTs = Math.max(0, ...data.map(d => d.ts));
      document.getElementById('stLast').textContent = lastTs ? relTime(lastTs) : '—';

      if (!geo.length) return;
      autoSpin = false;
      snapTo(geo[0].lat, geo[0].lon);
      geo.forEach((g, i) => setTimeout(() => dropDot(g.lat, g.lon, i === 0), i * 100));
      setTimeout(() => showCard(dots[0].v, geo[0]), 850);
      setTimeout(() => { autoSpin = true; }, 6000);
    }

    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target.id === 'logs-data') select(e.target);
    });
    document.getElementById('urlList').addEventListener('click', (e) => {
      const row = e.target.closest('.url-row[data-slug]');
      if (!row) return;
      document.querySelectorAll('.url-row').forEach(r => r.classList.remove('active'));
      row.classList.add('active');
    });

    try { build(); } catch (err) { console.error(err); document.getElementById('overlay').textContent = 'WebGL unavailable'; }
  </script>
</body>
</html>
