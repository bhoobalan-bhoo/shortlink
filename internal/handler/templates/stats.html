<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Stats · {{.Slug}}</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <main class="center">
    <div class="card">
      <p class="label">Total clicks</p>
      <div class="bignum">{{.Clicks}}</div>
      <dl class="kv">
        <dt>Short link</dt>
        <dd class="mono"><a href="{{.ShortURL}}">{{.ShortURL}}</a></dd>
        <dt>Destination</dt>
        <dd class="mono" style="font-size:13px;">{{.LongURL}}</dd>
        <dt>Created</dt>
        <dd>{{.Created}}</dd>
      </dl>
    </div>
    <p class="footer"><a href="/">← Shorten another</a> &nbsp;·&nbsp; <a href="/track-urls">Track your URLs</a></p>
  </main>
</body>
</html>
